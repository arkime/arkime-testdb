name: release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: read version from Cargo.toml
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - id: v
        run: |
          ver=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=$ver"   >> "$GITHUB_OUTPUT"
          echo "tag=v$ver"      >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.asset }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: arkimedb-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: arkimedb-linux-arm64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: arkimedb-macos-arm64
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust target
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Cache cargo registry + git + target
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked --bin arkimedb --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/arkimedb" "dist/${{ matrix.asset }}"
          strip "dist/${{ matrix.asset }}" || true
          ( cd dist && shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  release:
    name: publish release ${{ needs.version.outputs.tag }}
    needs: [version, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
          body: |
            ## Install

            ### Linux

            ```sh
            curl -L -o arkimedb https://github.com/arkime/arkime-testdb/releases/download/${{ needs.version.outputs.tag }}/arkimedb-linux-amd64
            #   or arkimedb-linux-arm64
            chmod +x arkimedb
            ./arkimedb serve --data-dir ./data --port 9200
            ```

            ### macOS (Apple Silicon)

            macOS quarantines downloaded binaries. Strip the quarantine
            attribute before first run, otherwise Gatekeeper will refuse
            to launch it:

            ```sh
            curl -L -o arkimedb https://github.com/arkime/arkime-testdb/releases/download/${{ needs.version.outputs.tag }}/arkimedb-macos-arm64
            xattr -d com.apple.quarantine arkimedb
            chmod +x arkimedb
            ./arkimedb serve --data-dir ./data --port 9200
            ```

            Then point Arkime at `http://localhost:9200` as you would Elasticsearch.

            See the [README](https://github.com/arkime/arkime-testdb#readme) for flags and details.
          files: |
            dist/arkimedb-linux-amd64
            dist/arkimedb-linux-amd64.sha256
            dist/arkimedb-linux-arm64
            dist/arkimedb-linux-arm64.sha256
            dist/arkimedb-macos-arm64
            dist/arkimedb-macos-arm64.sha256
